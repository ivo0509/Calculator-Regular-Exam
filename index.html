<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46" fill="none" stroke="#a0aabf" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
                </svg>
                <span class="logo-text"><span class="logo-lead">Lead</span><span class="logo-predictor">Predictor</span></span>
            </div>

            <div class="form-group-container">
                <div class="form-group">
                    <label data-i18n="language">Language</label>
                    <div class="custom-select" id="languageDropdown">
                        <div class="custom-select__selected" id="languageSelected">
                            <span class="fi fi-us"></span>
                            <span class="custom-select__label">English</span>
                            <span class="custom-select__arrow">&#8597;</span>
                        </div>
                        <ul class="custom-select__options" id="languageOptions">
                            <li class="custom-select__option" data-value="en">
                                <span class="fi fi-us"></span>
                                <span>English</span>
                            </li>
                            <li class="custom-select__option" data-value="bg">
                                <span class="fi fi-bg"></span>
                                <span>Български</span>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="currency">Currency</label>
                    <div class="select-wrapper">
                        <select id="currencySelect">
                            <option value="usd">$ US Dollar</option>
                            <option value="eur">€ Euro</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="campaignStart">Campaign Start</label>
                    <input type="date" value="2026-05-08">
                </div>

                <div class="form-group">
                    <label data-i18n="campaignEnd">Campaign End</label>
                    <input type="date" value="2026-11-04">
                </div>

                <div class="form-group">
                    <label data-i18n="totalRevenue">Total Revenue</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol currencyDisplay">$</span>
                        <input type="number" id="totalRevenue" value="10000">
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="avgOrderValue">Avg. Order Value</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol currencyDisplay">$</span>
                        <input type="number" id="avgOrderValue" value="1000">
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <div class="top-section">
                <!-- Chart Area -->
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>

                <!-- Stats Cards -->
                <div class="stats-cards">
                    <div class="card card-prospects">
                        <div class="card-header">
                            <span class="icon">📁</span>
                            <span class="title" data-i18n="prospects">Prospects</span>
                            <span class="percentage" id="prospectsPct">100%</span>
                        </div>
                        <div class="value" id="prospectsValue">125</div>
                        <div class="progress-bar">
                            <div class="progress" id="prospectsProgress" style="width: 100%;"></div>
                        </div>
                    </div>

                    <div class="card card-leads">
                        <div class="card-header">
                            <span class="icon">👤</span>
                            <span class="title" data-i18n="leads">Leads</span>
                            <span class="percentage" id="leadsPct">20%</span>
                        </div>
                        <div class="value" id="leadsValue">25</div>
                        <div class="progress-bar">
                            <div class="progress" id="leadsProgress" style="width: 20%;"></div>
                        </div>
                    </div>

                    <div class="card card-customers">
                        <div class="card-header">
                            <span class="icon">🏆</span>
                            <span class="title" data-i18n="customers">Customers</span>
                            <span class="percentage" id="customersPct">8%</span>
                        </div>
                        <div class="value" id="customersValue">10</div>
                        <div class="progress-bar">
                            <div class="progress" id="customersProgress" style="width: 8%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sliders Section -->
            <div class="sliders-section">
                <div class="slider-group">
                    <label data-i18n="leadResponseRate">Lead Response Rate</label>
                    <div class="slider-track-wrap">
                        <input type="range" min="0" max="100" value="40" step="0.01" class="slider" id="leadRate">
                    </div>
                    <div class="slider-val" id="leadRateVal">40.00%</div>
                </div>
                
                <div class="slider-group">
                    <label data-i18n="prospectResponseRate">Prospect Response Rate</label>
                    <div class="slider-track-wrap">
                        <input type="range" min="0" max="100" value="20" step="0.01" class="slider" id="prospectRate">
                    </div>
                    <div class="slider-val" id="prospectRateVal">20.00%</div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
